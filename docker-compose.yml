version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: prosubx_postgres
    environment:
      POSTGRES_DB: subscription_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ProsubX@2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./subscription_management_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/db/seed_admin.sql:/docker-entrypoint-initdb.d/02_seed_admin.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: prosubx_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: subscription_db
      DB_USER: postgres
      DB_PASSWORD: ProsubX@2025
      JWT_SECRET: prosubx_jwt_secret_min_32_chars_long_key
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: prosubx_refresh_secret_different_key_32ch
      JWT_REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 587
      SMTP_USER: your_mailtrap_user
      SMTP_PASS: your_mailtrap_pass
      FROM_EMAIL: no-reply@prosubx.com
      APP_URL: http://localhost:3000
      RAZORPAY_KEY_ID: rzp_test_xxxxxxxxxxxx
      RAZORPAY_KEY_SECRET: your_razorpay_key_secret
      RAZORPAY_WEBHOOK_SECRET: your_webhook_secret
      CLOUDINARY_CLOUD_NAME: dlgk8ngmu
      CLOUDINARY_API_KEY: 451714164697449
      CLOUDINARY_API_SECRET: lphUf_yyi2uNyPxNaBeLzzVRlRw
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: prosubx_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_xxxxxxxxxxxx
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

volumes:
  postgres_data:
